<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap');
        </style>
    <title>Budget</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <!-- Images for nav,-->
       <nav><a href="index.html"><img src="Images/EECU-Logo.png" alt="EECU-Logo"></a> <a href="Careers.html"><img src="Images/Profile.jpg" alt="Profile"></a></nav>

        <header>
            <h1>Budget Calculator</h1>
        </header>
        <main id="main-content">
            
        <div id="container-Left">
            <!--Income for selected career-->
        <section id="Income">
        
        </section>
    
        <section id="Expenses">
            <h2>Expenses</h2>
            <form class="row-Aligned">
                
            <label for="Student-Loans">Student Loans:</label>
            <input type="number" id="Student-Loans" name="Student-Loans" step="1" class="Expense">
            </form>
            
            <label for="Housing">Housing:</label>
            <input type="number" id="Housing" name="Housing" step="1" class="Expense">
            <label for="Essential">Essential:</label>
            <input type="number" id="Essential" name="Essential" step="1" class="Expense">
            <label for="Life-style">Lifestyle:</label>
            <input type="number" id="Lifestyle" name="Life-style" step="1" class="Expense">
            <label for="Savings">Savings:</label>
            <input type="number" id="Savings" name="Savings" step="1" class="Expense">
            <button id="Add-expense">Add Expense</button>
        </section>
        </div>

        <div id="container-Right">
            <canvas id="Chart"></canvas>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <script src="script.js" defer>
                displayResults();
                
                
            </script>
        </div>



        </main>
       

</body>
</html>
